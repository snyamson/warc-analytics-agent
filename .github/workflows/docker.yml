name: Docker Build & Deploy

on:
    push:
        branches:
            - main
            - '**docker'
            - '**cloud'

permissions:
    contents: read
    packages: write

env:
    REGISTRY: docker.io
    IMAGE_NAME: getnao/nao
    CACHE_REGISTRY: ghcr.io
    CACHE_IMAGE: ${{ github.repository }}/build-cache
    CLOUD_CONTAINER_NAME: nao-cloud
    CLOUD_DOMAIN: app.preview.getnao.io
    CLOUD_PORT: 5050

jobs:
    build:
        name: Build ${{ matrix.platform }}
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm

        steps:
            - uses: actions/checkout@v4

            - name: Get short SHA
              id: sha
              run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: Get build date
              id: build_date
              run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Log in to GitHub Container Registry (for build cache)
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.CACHE_REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            - name: Build and push by digest
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: ${{ matrix.platform }}
                  push: true
                  labels: ${{ steps.meta.outputs.labels }}
                  outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
                  cache-from: type=registry,ref=${{ env.CACHE_REGISTRY }}/${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
                  cache-to: type=registry,ref=${{ env.CACHE_REGISTRY }}/${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max
                  build-args: |
                      APP_VERSION=${{ github.ref_name }}
                      APP_COMMIT=${{ steps.sha.outputs.short_sha }}
                      APP_BUILD_DATE=${{ steps.build_date.outputs.value }}
                  secrets: |
                      GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

            - name: Export digest
              run: |
                  mkdir -p /tmp/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "/tmp/digests/${digest#sha256:}"

            - name: Upload digest
              uses: actions/upload-artifact@v4
              with:
                  name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        name: Merge and Push Manifest
        runs-on: ubuntu-latest
        needs: build

        outputs:
            image-tag: ${{ steps.sha.outputs.short_sha }}

        steps:
            - uses: actions/checkout@v4

            - name: Get short SHA
              id: sha
              run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: Download digests
              uses: actions/download-artifact@v4
              with:
                  path: /tmp/digests
                  pattern: digests-*
                  merge-multiple: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=

            - name: Create and push manifest
              working-directory: /tmp/digests
              run: |
                  docker buildx imagetools create \
                    $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                    $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

            - name: Update Docker Hub description
              uses: peter-evans/dockerhub-description@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
                  repository: ${{ env.IMAGE_NAME }}
                  readme-filepath: ./README-dockerhub.md

    deploy:
        name: Deploy to GCP instance
        runs-on: ubuntu-latest
        needs: merge
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || endsWith(github.ref, 'docker'))

        steps:
            - name: Deploy with remote ssh commands using ssh key
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: github-actions-demo
                  key: ${{ secrets.PRIVATE_KEY }}
                  script: |
                      docker pull getnao/nao:${{ needs.merge.outputs.image-tag }}
                      docker rm -f nao-chat 2>/dev/null || true
                      docker run -p 5005:5005 \
                        -e "BETTER_AUTH_URL=https://moon.getnao.io" \
                        -e "DB_SSL=true" \
                        -e "DB_URI=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@${{ secrets.POSTGRES_HOST }}:${{ secrets.POSTGRES_PORT }}/${{ secrets.POSTGRES_DB }}" \
                        -e "NAO_CONTEXT_SOURCE=git" \
                        -e "NAO_CONTEXT_GIT_URL=${{ secrets.NAO_CONTEXT_GIT_URL }}" \
                        -e "NAO_CONTEXT_GIT_TOKEN=${{ secrets.NAO_CONTEXT_GIT_TOKEN }}" \
                        -e "NAO_DEFAULT_PROJECT_PATH=/app/chat-analytics" \
                        -e GOOGLE_APPLICATION_CREDENTIALS_JSON='${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' \
                        -e "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
                        -e "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
                        -e "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" \
                        --device /dev/kvm \
                        --name nao-chat \
                        -d getnao/nao:${{ needs.merge.outputs.image-tag }}

    deploy-cloud:
        name: Deploy Cloud
        runs-on: ubuntu-latest
        needs: merge
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main'|| github.ref == 'refs/heads/cloud' || endsWith(github.ref, 'cloud'))

        steps:
            - name: Deploy to cloud server
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: github-actions-demo
                  key: ${{ secrets.PRIVATE_KEY }}
                  script: |
                      docker pull getnao/nao:${{ needs.merge.outputs.image-tag }}
                      docker rm -f "${{ env.CLOUD_CONTAINER_NAME }}" 2>/dev/null || true
                      docker volume create nao-app-preview-projects 2>/dev/null || true
                      docker run -d \
                          --name "${{ env.CLOUD_CONTAINER_NAME }}" \
                          -p "${{ env.CLOUD_PORT }}:5005" \
                          -v nao-app-preview-projects:/app/projects \
                          -e "NAO_PROJECTS_DIR=/app/projects" \
                          -e "BETTER_AUTH_URL=https://${{ env.CLOUD_DOMAIN }}" \
                          -e "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" \
                          -e "DB_SSL=true" \
                          -e "DB_URI=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@${{ secrets.POSTGRES_HOST }}:${{ secrets.POSTGRES_PORT }}/app" \
                          -e "NAO_MODE=cloud" \
                          -e "GITHUB_CLIENT_ID=${{ secrets.PREVIEW_GITHUB_CLIENT_ID }}" \
                          -e "GITHUB_CLIENT_SECRET=${{ secrets.PREVIEW_GITHUB_CLIENT_SECRET }}" \
                          -e "CLOUD_GITHUB_CLIENT_ID=${{ secrets.CLOUD_GITHUB_CLIENT_ID }}" \
                          -e "CLOUD_GITHUB_CLIENT_SECRET=${{ secrets.CLOUD_GITHUB_CLIENT_SECRET }}" \
                          -e "POSTHOG_DISABLED=true" \
                          -e "NAO_CONTEXT_SOURCE=api" \
                          -e "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" \
                          -e "SMTP_HOST=${{ secrets.SMTP_HOST }}" \
                          -e "SMTP_PORT=${{ secrets.SMTP_PORT }}" \
                          -e "SMTP_MAIL_FROM=${{ secrets.SMTP_MAIL_FROM }}" \
                          -e "SMTP_SSL=${{ secrets.SMTP_SSL }}" \
                          getnao/nao:${{ needs.merge.outputs.image-tag }}

                      echo "Waiting for container to start..."
                      sleep 10

                      # Configure nginx for app.preview.getnao.io
                      echo "\"~^app\" ${{ env.CLOUD_PORT }};" > "/home/github-actions-demo/nginx/preview.d/app.conf"
                      docker exec nginx nginx -s reload

                      echo "Deployed at https://${{ env.CLOUD_DOMAIN }}"
